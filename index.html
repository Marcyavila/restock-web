  <style>
    :root {
      --bg: #07080c;
      --surface: #0d0f14;
      --border: rgba(255,255,255,0.05);
      --border-strong: rgba(255,255,255,0.08);
      --text: #f8f9fc;
      --text-secondary: rgba(248, 249, 252, 0.72);
      --text-tertiary: rgba(248, 249, 252, 0.6);
      --accent: #8b5cf6;
      --accent-hover: #9d6ffa;
      --accent-glow: rgba(139, 92, 246, 0.28);
      --accent-muted: rgba(139,92,246,0.12);
      --success: #22c55e;
      --radius: 16px;
      --radius-sm: 12px;
      --radius-lg: 24px;
      --shadow-card: 0 24px 48px -12px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255,255,255,0.04);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }
    html { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      background: radial-gradient(ellipse 100% 70% at 50% -20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(99, 102, 241, 0.04) 0%, transparent 50%),
        linear-gradient(180deg, #07080c 0%, #0a0c12 40%, #07080c 100%);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Peek-style starfield */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .stars .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px 0 rgba(139, 92, 246, 0.18);
      animation: star-peek 4s ease-in-out infinite;
    }
    .stars .star:nth-child(odd) { animation-delay: -1s; }
    .stars .star:nth-child(3n) { animation-delay: -2s; }
    .stars .star.star--small {
      width: 1px;
      height: 1px;
      box-shadow: 0 0 4px 0 rgba(139, 92, 246, 0.14);
    }
    @keyframes star-peek {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    .page {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 520px;
      width: 100%;
      background: linear-gradient(180deg, rgba(18, 21, 28, 0.80) 0%, rgba(18, 21, 28, 0.66) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.085);
      border-radius: var(--radius-lg);
      box-shadow: 0 34px 80px -26px rgba(0, 0, 0, 0.72), 0 0 0 1px rgba(255,255,255,0.06);
      padding: 3rem 2.5rem;
    }
    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background:
        radial-gradient(140% 90% at 50% 0%, rgba(139, 92, 246, 0.095) 0%, transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.045) 0%, transparent 42%);
      opacity: 1;
    }
    .page::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(139,92,246,0.32) 0%, rgba(255,255,255,0.10) 35%, rgba(99,102,241,0.18) 70%, rgba(139,92,246,0.24) 100%);
      opacity: 0.35;
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      padding: 1px;
    }
    .page > * { position: relative; }

    .page-spotlight {
      position: fixed;
      left: 50%;
      top: 45%;
      width: 700px;
      height: 700px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle,
          rgba(139, 92, 246, 0.16) 0%,
          rgba(139, 92, 246, 0.08) 22%,
          rgba(255, 255, 255, 0.04) 38%,
          rgba(139, 92, 246, 0.03) 52%,
          transparent 72%);
      filter: blur(40px);
    }

    .logo {
      display: block;
      height: 60px;
      width: auto;
      max-width: 220px;
      margin: 0 auto 1.15rem;
      object-fit: contain;
      -webkit-user-drag: none;
      user-drag: none;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: auto;
    }

    .headline {
      font-size: clamp(1.9rem, 2.7vw, 2.2rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.12;
      letter-spacing: -0.04em;
      margin: 0 auto 0.75rem;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
      text-wrap: balance;
      max-width: 20ch;
    }
    .headline-line {
      display: block;
      font-size: 0.82em;
      opacity: 0.78;
      letter-spacing: -0.02em;
    }
    .rotating-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 2.2em; /* fixed so box never changes height when phrase rotates */
      line-height: 1.06;
      margin: 0.08em auto 0.08em;
      overflow: hidden;
    }
    .rotating-text {
      display: inline-block;
      will-change: opacity, transform;
      transition: opacity 420ms var(--ease-out), transform 420ms var(--ease-out);
      opacity: 1;
      transform: translateY(0);
      color: #a78bfa; /* fallback */
      font-size: 1.14em;
      letter-spacing: -0.03em;
    }
    @supports ((-webkit-background-clip: text) or (background-clip: text)) {
      .rotating-text {
        background:
          linear-gradient(105deg, transparent 0%, rgba(255,255,255,0.2) 18%, transparent 38%, transparent 62%, rgba(255,255,255,0.15) 82%, transparent 100%),
          linear-gradient(90deg, #ddd6fe 0%, #8b5cf6 45%, #a78bfa 100%);
        background-size: 220% 100%, 100% 100%;
        background-position: -10% 0, 0 0;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
        animation: rotating-text-shimmer 5s ease-in-out infinite;
      }
    }
    @keyframes rotating-text-shimmer {
      0%, 100% { background-position: -10% 0, 0 0; }
      50% { background-position: 110% 0, 0 0; }
    }
    .rotating-text.is-fading-out {
      opacity: 0;
      transform: translateY(6px);
    }
    .tagline {
      font-size: 0.9375rem;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.55;
      letter-spacing: 0.01em;
      margin: 0 auto 1.5rem;
      max-width: 52ch;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }
    .waitlist-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 1rem;
    }
    .hero-divider {
      height: 1px;
      width: 100%;
      max-width: 460px;
      margin: 0 auto 1.25rem;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 20%, rgba(139,92,246,0.22) 50%, rgba(255,255,255,0.08) 80%, transparent 100%);
      opacity: 0.6;
    }
    .email-input-wrap {
      position: relative;
      width: 100%;
    }
    .email-input-wrap::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: calc(var(--radius-sm) + 2px);
      pointer-events: none;
      background: radial-gradient(120% 120% at 50% 0%, rgba(139, 92, 246, 0.16) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 220ms var(--ease-out);
    }
    .email-input-wrap:focus-within::before {
      opacity: 1;
    }
    .email-input-wrap.shake {
      animation: shake-kb 0.3s ease-in-out both;
    }
    .waitlist-form .email-input-wrap.shake input[type="email"] {
      border-color: rgba(239, 68, 68, 0.6) !important;
      box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.25), inset 0 1px 0 rgba(255,255,255,0.02);
    }
    .email-error-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      padding: 0 20px;
      line-height: 52px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      color: #f87171;
      background: rgba(15, 18, 25, 0.6);
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      pointer-events: auto;
      cursor: text;
      border-radius: var(--radius-sm);
    }
    .email-error-overlay.visible {
      display: block;
    }
    .waitlist-form input[type="email"] {
      width: 100%;
      height: 52px;
      padding: 0 20px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: var(--radius-sm);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
      transition: border-color 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out), background 0.2s ease;
      position: relative;
      z-index: 0;
    }
    .waitlist-form input[type="email"]:hover {
      border-color: rgba(255,255,255,0.14);
    }
    .waitlist-form input[type="email"]::placeholder {
      color: var(--text-tertiary);
    }
    .waitlist-form input[type="email"].error-placeholder::placeholder {
      color: #f87171;
    }
    .waitlist-form input[type="email"].error-value {
      color: #f87171;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    .waitlist-form input[type="email"]:focus {
      outline: none;
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.25), inset 0 1px 0 rgba(255,255,255,0.02);
      background: rgba(255, 255, 255, 0.055);
    }
    @keyframes shake-kb {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(2px); }
    }

    .waitlist-form button {
      width: 100%;
      height: 52px;
      padding: 0 24px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
      background: linear-gradient(180deg, #9370f7 0%, #7c3aed 100%);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 1px 2px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s var(--ease-out), transform 0.2s var(--ease-out), filter 0.2s ease;
      position: relative;
      overflow: hidden;
      -webkit-user-drag: none;
      user-drag: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .waitlist-form button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 50%);
      opacity: 0.8;
      pointer-events: none;
    }
    .waitlist-form button:hover {
      box-shadow: 0 1px 0 rgba(255,255,255,0.1) inset, 0 4px 12px rgba(139, 92, 246, 0.25);
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .waitlist-form button:active {
      transform: translateY(0);
      box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 1px 2px rgba(0,0,0,0.08);
    }
    .waitlist-form button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .form-note {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      letter-spacing: 0.01em;
      margin: 0;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .success-message {
      display: none;
      padding: 1.5rem 1.75rem;
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: 0.01em;
      color: #86efac;
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.22);
      border-radius: var(--radius-sm);
      margin: 0 auto 1rem;
      max-width: 28ch;
      text-align: center;
    }
    .success-message.visible {
      display: block;
    }

    .error-message {
      display: none;
      padding: 16px 20px;
      font-size: 0.9375rem;
      color: #f87171;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.22);
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
    }
    .error-message.visible {
      display: block;
    }

    .footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      letter-spacing: 0.02em;
      text-align: center;
      opacity: 0.7;
    }
    .footer-domain {
      display: block;
      margin-top: 0.5rem;
      color: var(--text-tertiary);
      opacity: 0.9;
    }
    .footer-links {
      display: block;
      margin-top: 0.5rem;
    }
    .footer a {
      color: var(--accent-hover);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .footer a:hover {
      color: #b39cff;
      text-decoration: underline;
    }

    @media (prefers-reduced-motion: reduce) {
      .stars .star,
      .stars .star.star--small {
        animation: none;
        opacity: 0.5;
      }
      .email-input-wrap.shake {
        animation: none;
      }
      .rotating-text {
        animation: none;
      }
    }

    /* Mobile & small screens */
    @media (max-width: 480px) {
      .page-spotlight {
        width: 520px;
        height: 520px;
        opacity: 0.72;
        background:
          radial-gradient(circle,
            rgba(139, 92, 246, 0.12) 0%,
            rgba(139, 92, 246, 0.06) 22%,
            rgba(255, 255, 255, 0.03) 38%,
            transparent 55%);
      }
      body {
        padding: 1.25rem 1rem;
        padding-left: max(1rem, env(safe-area-inset-left));
        padding-right: max(1rem, env(safe-area-inset-right));
        padding-bottom: max(1.25rem, env(safe-area-inset-bottom));
      }
      .page {
        max-width: 100%;
        padding: 2rem 1.5rem;
      }
      .logo {
        height: 44px;
        max-width: 180px;
        margin-bottom: 1.25rem;
      }
      .headline {
        font-size: 1.75rem;
        margin-bottom: 0.5rem;
        padding: 0 0.25rem;
        text-wrap: balance;
      }
      .rotating-wrap {
        height: 2.15em;
      }
      .tagline {
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
        padding: 0 0.25rem;
      }
      .hero-divider {
        margin-bottom: 0.95rem;
        opacity: 0.55;
      }
      .waitlist-form {
        gap: 16px;
        margin-bottom: 1rem;
      }
      .waitlist-form input[type="email"],
      .waitlist-form button {
        height: 48px;
        font-size: 16px; /* prevents iOS zoom on focus */
      }
      .waitlist-form input[type="email"] {
        padding: 0 16px;
      }
      .email-error-overlay {
        padding: 0 16px;
        line-height: 48px;
      }
      .waitlist-form button {
        padding: 0 20px;
      }
      .form-note {
        font-size: 0.75rem;
      }
      .success-message,
      .error-message {
        padding: 16px 18px;
        font-size: 0.9375rem;
      }
      .footer {
        margin-top: 2rem;
        font-size: 0.75rem;
        padding: 0 0.25rem;
      }
    }

    /* Very small phones */
    @media (max-width: 360px) {
      .page-spotlight {
        width: 420px;
        height: 420px;
        opacity: 0.6;
      }
      body {
        padding: 1rem 0.75rem;
      }
      .page {
        padding: 1.5rem 1rem;
      }
      .logo {
        height: 40px;
        max-width: 160px;
        margin-bottom: 1rem;
      }
      .headline {
        font-size: 1.5rem;
        margin-bottom: 0.45rem;
      }
      .rotating-wrap {
        height: 2.1em;
      }
      .tagline {
        font-size: 0.8125rem;
        margin-bottom: 1.25rem;
      }
      .hero-divider {
        margin-bottom: 0.85rem;
        opacity: 0.5;
      }
      .waitlist-form input[type="email"],
      .waitlist-form button {
        height: 44px;
      }
      .email-error-overlay {
        line-height: 44px;
      }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true">
    <span class="star" style="left: 5%; top: 12%;"></span>
    <span class="star star--small" style="left: 12%; top: 28%;"></span>
    <span class="star" style="left: 88%; top: 18%;"></span>
    <span class="star star--small" style="left: 92%; top: 35%;"></span>
    <span class="star" style="left: 22%; top: 55%;"></span>
    <span class="star star--small" style="left: 75%; top: 62%;"></span>
    <span class="star" style="left: 8%; top: 78%;"></span>
    <span class="star star--small" style="left: 45%; top: 22%;"></span>
    <span class="star" style="left: 55%; top: 72%;"></span>
    <span class="star star--small" style="left: 35%; top: 88%;"></span>
    <span class="star" style="left: 68%; top: 42%;"></span>
    <span class="star star--small" style="left: 18%; top: 65%;"></span>
    <span class="star star--small" style="left: 52%; top: 15%;"></span>
    <span class="star" style="left: 38%; top: 48%;"></span>
    <span class="star star--small" style="left: 82%; top: 58%;"></span>
    <span class="star" style="left: 28%; top: 38%;"></span>
    <span class="star star--small" style="left: 62%; top: 85%;"></span>
    <span class="star star--small" style="left: 42%; top: 8%;"></span>
    <span class="star" style="left: 78%; top: 72%;"></span>
    <span class="star star--small" style="left: 8%; top: 48%;"></span>
    <span class="star" style="left: 58%; top: 28%;"></span>
    <span class="star star--small" style="left: 92%; top: 82%;"></span>
    <span class="star" style="left: 48%; top: 58%;"></span>
    <span class="star star--small" style="left: 15%; top: 18%;"></span>
    <span class="star" style="left: 85%; top: 45%;"></span>
  </div>

  <div class="page-spotlight" aria-hidden="true"></div>

  <main class="page">
    <img src="logo.png" alt="ReStock Pro" class="logo" width="254" height="60" draggable="false">
    <h1 class="headline">
      <span class="headline-line">Never miss</span>
      <span class="rotating-wrap">
        <span class="rotating-text" id="rotatingText">a PS5 restock</span>
      </span>
      <span class="headline-line">again.</span>
    </h1>
    <p class="tagline">Get instant alerts when products restock across stores.</p>
    <div class="hero-divider" aria-hidden="true"></div>

    <div id="successMessage" class="success-message" role="status">
      You’re in. We’ll email you when ReStock launches.
    </div>

    <div id="errorMessage" class="error-message" role="alert"></div>

    <!-- action used when JS is off (progressive enhancement) -->
    <form id="waitlistForm" class="waitlist-form" action="/api/waitlist" method="post" novalidate>
      <div class="email-input-wrap" id="emailInputWrap">
        <input type="email" name="email" id="email" placeholder="you@email.com" required autocomplete="email" aria-label="Email address">
        <div class="email-error-overlay" id="emailErrorOverlay" aria-hidden="true"></div>
      </div>
      <div class="hidden-fields" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden;clip:rect(0,0,0,0);">
        <input type="hidden" name="referrer" value="">
      </div>
      <button type="submit" id="submitBtn" draggable="false">Get Early Access</button>
    </form>
    <p class="form-note">No spam. Just one email when we launch.</p>

    <footer class="footer">
      Chrome extension launching soon
      <span class="footer-domain">getrestock.app</span>
      <span class="footer-links"><a href="/terms.html">Terms</a> · <a href="/privacy.html">Privacy</a></span>
    </footer>
  </main>
  <script>
    (function() {
      var form = document.getElementById('waitlistForm');
      var emailInput = document.getElementById('email');
      var emailInputWrap = document.getElementById('emailInputWrap');
      var emailErrorOverlay = document.getElementById('emailErrorOverlay');
      var submitBtn = document.getElementById('submitBtn');
      var successEl = document.getElementById('successMessage');
      var errorEl = document.getElementById('errorMessage');
      var referrerInput = form ? form.querySelector('input[name="referrer"]') : null;
      var defaultPlaceholder = 'you@email.com';
      var errorPlaceholder = 'Please enter a valid email address.';
      var placeholderTimeout = null;

      function showSuccess() {
        errorEl.classList.remove('visible');
        successEl.classList.add('visible');
        form.style.display = 'none';
        document.querySelector('.form-note').style.display = 'none';
      }

      function showError(msg) {
        errorEl.textContent = msg || 'Something went wrong. Please try again.';
        errorEl.classList.add('visible');
      }

      function clearErrorInbox() {
        emailErrorOverlay.textContent = '';
        emailErrorOverlay.classList.remove('visible');
        if (emailInputWrap) emailInputWrap.classList.remove('shake');
        emailInput.value = '';
        emailInput.placeholder = defaultPlaceholder;
        emailInput.readOnly = false;
        if (placeholderTimeout) { clearTimeout(placeholderTimeout); placeholderTimeout = null; }
        emailErrorOverlay.removeEventListener('click', clearErrorInbox);
        emailInput.focus();
      }

      function isValidEmail(str) {
        var re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return typeof str === 'string' && str.length > 0 && re.test(str);
      }

      (function setupRotatingHeadline() {
        var phrases = [
          'a PS5 restock',
          'sneaker drops',
          'Pokémon TCG drops',
          'limited releases',
          'rare item restocks'
        ];

        var el = document.getElementById('rotatingText');
        if (!el) return;

        var mql = window.matchMedia ? window.matchMedia('(prefers-reduced-motion: reduce)') : null;
        var reduceMotion = !!(mql && mql.matches);
        var idx = 0;
        var intervalId = null;

        function setPhrase(i) {
          el.textContent = phrases[i % phrases.length];
        }

        function tick() {
          el.classList.add('is-fading-out');
          window.setTimeout(function() {
            idx = (idx + 1) % phrases.length;
            setPhrase(idx);
            el.classList.remove('is-fading-out');
          }, 220);
        }

        setPhrase(idx);

        function start() {
          if (reduceMotion) return;
          if (intervalId) return;
          intervalId = window.setInterval(tick, 2800);
        }

        function stop() {
          if (!intervalId) return;
          window.clearInterval(intervalId);
          intervalId = null;
        }

        if (mql && mql.addEventListener) {
          mql.addEventListener('change', function(e) {
            reduceMotion = !!e.matches;
            if (reduceMotion) stop();
            else start();
          });
        }

        start();
      })();

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var email = (emailInput.value || '').trim();
        if (!email) {
          emailInput.focus();
          return;
        }
        if (!isValidEmail(email)) {
          emailInputWrap.classList.add('shake');
          emailErrorOverlay.textContent = errorPlaceholder;
          emailErrorOverlay.classList.add('visible');
          emailInput.value = '';
          emailInput.placeholder = '';
          emailInput.readOnly = true;
          if (placeholderTimeout) clearTimeout(placeholderTimeout);
          placeholderTimeout = setTimeout(clearErrorInbox, 2500);
          emailErrorOverlay.addEventListener('click', clearErrorInbox);
          emailInput.focus();
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Joining…';
        errorEl.classList.remove('visible');

        var referrer = (typeof document !== 'undefined' && document.referrer) ? document.referrer.trim() : '';
        if (!referrer) referrer = '(direct)';
        if (referrerInput) referrerInput.value = referrer;

        var SUCCESS_TIMEOUT_MS = 15000;
        var abort = new AbortController();
        var timeout = setTimeout(function() { abort.abort(); }, SUCCESS_TIMEOUT_MS);

        fetch('/api/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, referrer: referrer }),
          signal: abort.signal
        })
          .then(function(r) {
            if (!r.ok) throw new Error('bad');
            return r.json().catch(function() { return { ok: true }; });
          })
          .then(function(data) {
            clearTimeout(timeout);
            if (data && data.ok) showSuccess();
            else showError('Something went wrong. Please try again.');
          })
          .catch(function() {
            clearTimeout(timeout);
            showError('Request timed out. Please check your connection and try again.');
          })
          .finally(function() {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Get Early Access';
          });
      });
    })();
  </script>
</body>
</html>
