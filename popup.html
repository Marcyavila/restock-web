<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReStock Pro</title>
  <link rel="icon" type="image/png" href="icon48.png" sizes="48x48">
  <link rel="icon" type="image/png" href="icon16.png" sizes="16x16">
  <link rel="apple-touch-icon" href="icon128.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0e;
      --surface: #151518;
      --surface-elevated: #1a1a1f;
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.1);
      --text: #fafafa;
      --text-secondary: #8e8e98;
      --text-tertiary: #5c5c66;
      --accent: #7c3aed;
      --accent-hover: #8b5cf6;
      --accent-muted: rgba(124, 58, 237, 0.15);
      --danger: #ef4444;
      --success: #22c55e;
      --ease: cubic-bezier(0.32, 0.72, 0, 1);
      --ease-out: cubic-bezier(0.33, 1, 0.68, 1);
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --radius: 14px;
      --radius-sm: 10px;
      --radius-lg: 18px;
      /* Primitive typography scale — raw sizes, do not use directly in components */
      --font-size-1: 11px;
      --font-size-2: 12px;
      --font-size-3: 13px;
      --font-size-4: 14px;
      --font-size-5: 15px;
      --font-size-6: 16px;
      --font-size-7: 18px;
      --font-size-8: 22px;
      --line-height-tight: 1.1;
      --line-height-normal: 1.4;
      --line-height-relaxed: 1.5;
      --font-weight-regular: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;
      /* Semantic typography — use these in UI; they reference primitives.
       * Usage: type-caption = labels, metadata, sort indicator; type-table-header = column headers;
       * type-status-pill = status badges; type-metadata = pill labels, hints; type-body = default copy;
       * type-button = button labels; type-product-name = row names, emphasis; type-input = search/inputs;
       * type-panel-title = toggle, controls; type-section-label = "Tracked items" (peek);
       * type-section-title / type-app-title = section titles, app title. */
      --type-caption: var(--font-size-1);
      --type-table-header: var(--font-size-2);
      --type-status-pill: var(--font-size-2);
      --type-metadata: var(--font-size-2);
      --type-body: var(--font-size-3);
      --type-button: var(--font-size-3);
      --type-product-name: var(--font-size-4);
      --type-input: var(--font-size-4);
      --type-panel-title: var(--font-size-5);
      --type-section-label: var(--font-size-4);
      --type-section-title: var(--font-size-7);
      --type-app-title: var(--font-size-7);
      /* Dashboard table: single source of truth for header + rows */
      --table-cols: 72px minmax(240px, 1fr) 140px 120px;
      --table-pad-x: 24px;
      --table-row-h: 68px;
      --status-pill-w: 100px;
      /* Table image column: wrapper and content sizing */
      --col-img-wrap-size: 56px;
      --col-img-max-size: 48px;
    }

    /* Popup only: fixed size when NOT standalone */
    html:not(.is-standalone):not(.standalone-mode) { background: var(--bg); width: 420px; height: 580px; margin: 0; padding: 0; }
    body:not(.is-standalone):not(.standalone-mode) {
      width: 420px; height: 580px; margin: 0; padding: 0;
      background: transparent;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: var(--type-body);
      font-weight: var(--font-weight-medium);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.45;
      letter-spacing: 0em;
    }
    body:not(.is-standalone):not(.standalone-mode) .main-wrapper {
      width: 100%;
      height: 580px;
    }

    .main-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 24px 48px -12px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
    }
    /* Standalone: full viewport, no fixed dimensions */
    html.is-standalone { width: 100%; height: 100%; min-height: 100%; background: var(--bg); }
    body.is-standalone {
      width: 100%; height: 100vh; min-height: 100vh; margin: 0; padding: 0;
      background: linear-gradient(165deg, #0c0c0e 0%, #0f0f12 40%, #0c0c0e 100%);
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: var(--type-body);
      font-weight: var(--font-weight-medium);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.45;
      letter-spacing: 0em;
    }
    body.is-standalone .main-wrapper { width: 100%; height: 100%; min-height: 0; border-radius: 0; box-shadow: none; }
    body.is-standalone #window-button { display: none; }
    body.is-standalone #itemStatuses {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: clamp(12px, 2vw, 20px);
    }
    /* ========== .standalone-mode: Pro-Dashboard ========== */
    html.standalone-mode {
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: var(--bg);
      overflow: hidden;
    }
    body.standalone-mode {
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 100vh;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(165deg, #08080a 0%, #0c0c0e 50%, #08080a 100%);
    }
    body.standalone-mode .main-wrapper {
      display: flex;
      flex: 1 1 0%;
      min-height: 0;
      min-width: 0;
      width: 100%;
      height: 100%;
      position: static;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
      overflow: hidden;
    }
    body.standalone-mode .main-wrapper { position: relative; }
    /* Standalone: dots as overlay on top so panels don't block; layer background transparent so only stars show */
    body.standalone-mode .main-wrapper > .bg-layers { display: block !important; position: absolute; inset: 0; z-index: 1; border-radius: 0; pointer-events: none; }
    body.standalone-mode .main-wrapper > .bg-layers .bg-layer { border-radius: 0; background: transparent !important; }
    body.standalone-mode .main-wrapper[data-bg="peek"] > .bg-layers .bg-layer--peek,
    body.standalone-mode .main-wrapper[data-bg="classic"] > .bg-layers .bg-layer--classic,
    body.standalone-mode .main-wrapper[data-bg="velvet"] > .bg-layers .bg-layer--velvet,
    body.standalone-mode .main-wrapper[data-bg="pulse"] > .bg-layers .bg-layer--pulse,
    body.standalone-mode .main-wrapper[data-bg="depth"] > .bg-layers .bg-layer--depth { display: block !important; }
    body.standalone-mode .main-wrapper > .dashboard-wrapper { position: relative; z-index: 0; }
    body.standalone-mode #window-button,
    body.standalone-mode [title="Open in separate window"] { display: none !important; }
    /* Dashboard: fill main wrapper; sidebar + canvas must both be visible */
    body.standalone-mode .dashboard-wrapper {
      display: flex;
      flex: 1 1 0%;
      min-height: 0;
      min-width: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      align-self: stretch;
    }
    /* Left sidebar: Control Panel — 320px */
    body.standalone-mode .dashboard-sidebar {
      width: 320px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: var(--space-8);
      background: #060608;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      overflow-y: auto;
      overflow-x: hidden;
    }
    body.standalone-mode .dashboard-sidebar .top-bar,
    body.standalone-mode .dashboard-sidebar .bottom-bar {
      padding: 0;
      margin: 0;
      background: transparent;
      border: none;
    }
    body.standalone-mode .dashboard-sidebar .top-bar {
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex-shrink: 0;
    }
    body.standalone-mode .dashboard-sidebar .add-bar {
      padding: 0;
      margin: 0;
      gap: 12px;
      border: none;
      background: transparent;
    }
    body.standalone-mode .dashboard-sidebar .input-wrap {
      height: 48px;
      min-height: 48px;
    }
    body.standalone-mode .dashboard-sidebar .dashboard-action-zone {
      flex-shrink: 0;
      padding-top: 24px;
      margin-top: auto;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    body.standalone-mode .dashboard-sidebar .dashboard-action-zone .disabled-hint { margin-top: 8px; }
    body.standalone-mode .dashboard-sidebar #itemInput {
      height: 48px;
      min-height: 48px;
      padding: 14px 18px;
      font-size: var(--type-product-name);
      border-radius: 12px;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    body.standalone-mode .dashboard-sidebar #itemInput:focus {
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
      border-color: rgba(124, 58, 237, 0.5);
    }
    /* Global Pulse: compact single row, never clipped */
    body.standalone-mode .pulse-header,
    body.standalone-mode .pulse-header * {
      -webkit-user-drag: none;
      user-drag: none;
      user-select: none;
    }
    body.standalone-mode .pulse-header {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      flex-wrap: nowrap;
      padding: 16px 0 20px;
      margin-bottom: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    body.standalone-mode .pulse-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 52px;
      min-height: 52px;
      padding: 10px 16px;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      font-size: var(--type-body);
      font-weight: var(--font-weight-semibold);
      flex-shrink: 0;
    }
    body.standalone-mode .pulse-pill-label {
      color: var(--text-tertiary);
      font-weight: var(--font-weight-medium);
      font-size: var(--type-metadata);
      line-height: 1.1;
      letter-spacing: 0.04em;
    }
    body.standalone-mode .pulse-pill-value { color: var(--text); }
    body.standalone-mode #pulseNextScanValue[data-empty="true"],
    body.standalone-mode #pulsePingValue[data-empty="true"] { color: rgba(255, 255, 255, 0.38); }
    body.standalone-mode .pulse-pill-live {
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 2px;
    }
    body.standalone-mode .pulse-pill-live .pulse-status-value-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    body.standalone-mode .pulse-pill-live .pulse-pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    body.standalone-mode .pulse-pill-live.is-live .pulse-pill-dot {
      background: #00f5d4;
    }
    body.standalone-mode .pulse-pill-dot.breathing {
      animation: pulse-breathe 2s ease-in-out infinite;
    }
    @keyframes pulse-breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }
    /* Toast container */
    body.standalone-mode .toast-container {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    body.standalone-mode .toast {
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      font-size: var(--type-product-name);
      font-weight: var(--font-weight-medium);
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
    }
    body.standalone-mode .toast.toast-visible {
      opacity: 1;
      transform: translateY(0);
    }
    body.standalone-mode .toast.toast-success {
      border-color: rgba(34, 197, 94, 0.35);
      background: rgba(34, 197, 94, 0.08);
      color: #86efac;
    }
    body.standalone-mode .toast.toast-error {
      border-color: rgba(239, 68, 68, 0.4);
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
    }
    body.standalone-mode .toast.toast-info {
      border-color: rgba(124, 58, 237, 0.4);
      background: rgba(124, 58, 237, 0.1);
      color: #a78bfa;
    }
    /* Sidebar: larger primary button */
    body.standalone-mode .dashboard-sidebar .bottom-bar-actions {
      max-width: 100%;
      width: 100%;
    }
    body.standalone-mode .dashboard-sidebar #toggleMonitoring {
      padding: 16px 24px;
      font-size: var(--type-panel-title);
      font-weight: var(--font-weight-bold);
      border-radius: var(--radius-sm);
      transition: background 0.2s, transform 0.1s;
    }
    body.standalone-mode .dashboard-sidebar #toggleMonitoring:hover {
      transform: translateY(-2px);
    }
    body.standalone-mode .dashboard-sidebar #toggleMonitoring.running {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.5);
      color: #f87171;
    }
    body.standalone-mode .dashboard-sidebar #toggleMonitoring.running:hover {
      background: rgba(239, 68, 68, 0.3);
    }
    /* Countdown progress bar (standalone sidebar) */
    body.standalone-mode .countdown-progress-wrap {
      margin-top: 8px;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    body.standalone-mode .countdown-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 1s linear;
    }
    /* Main canvas */
    body.standalone-mode .dashboard-canvas {
      flex: 1 1 0%;
      min-width: 280px;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: var(--space-8);
      overflow: hidden;
      background: radial-gradient(ellipse 120% 90% at 50% 0%, rgba(14, 14, 18, 0.98) 0%, rgba(8, 8, 12, 1) 100%);
      width: 100%;
    }
    body.standalone-mode .dashboard-canvas .pulse-header,
    body.standalone-mode .dashboard-canvas .list-header-row,
    body.standalone-mode .dashboard-canvas .dashboard-list-toolbar {
      flex-shrink: 0;
      display: flex;
      visibility: visible;
    }
    body.standalone-mode .dashboard-canvas .list-header-row {
      flex-shrink: 0;
      margin-bottom: var(--space-6);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-6);
      flex-wrap: nowrap;
    }
    body.standalone-mode .dashboard-canvas .list-section-label {
      font-size: var(--type-section-title);
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }
    body.standalone-mode .dashboard-canvas .clear-list-btn {
      padding: 10px 22px;
      font-size: var(--type-body);
      font-weight: var(--font-weight-semibold);
      letter-spacing: 0.02em;
      border-radius: var(--radius-sm);
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    body.standalone-mode .dashboard-canvas .clear-list-btn:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.4);
      color: #f87171;
      transform: translateY(-1px);
    }
    /* Toolbar: search full-width, CSV buttons never truncate */
    body.standalone-mode .dashboard-list-toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      flex-shrink: 0;
      margin-bottom: var(--space-6);
      margin-top: 4px;
      width: 100%;
      min-width: 0;
    }
    body.standalone-mode .dashboard-search-input {
      flex: 1;
      min-width: 240px;
      max-width: none;
      padding: 12px 18px;
      font-size: var(--type-product-name);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    body.standalone-mode .dashboard-search-input::placeholder {
      color: var(--text-tertiary);
    }
    body.standalone-mode .dashboard-search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
    }
    body.standalone-mode .dashboard-toolbar-actions {
      display: flex;
      gap: var(--space-3);
      flex-shrink: 0;
      margin-left: auto;
    }
    body.standalone-mode .dashboard-btn {
      padding: 12px 20px;
      font-size: var(--type-body);
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
      min-width: 0;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }
    body.standalone-mode .dashboard-btn-secondary {
      background: rgba(124, 58, 237, 0.15);
      border-color: rgba(124, 58, 237, 0.35);
      color: #a78bfa;
      min-width: 100px;
    }
    body.standalone-mode .dashboard-btn-secondary:hover {
      background: rgba(124, 58, 237, 0.25);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    /* Table wrap: takes remaining space, scrollable body */
    body.standalone-mode .dashboard-table-wrap {
      flex: 1 1 0%;
      min-height: 200px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.02);
      overflow: hidden;
      width: 100%;
    }
    /* Dashboard table: single source of truth — header and rows use same grid */
    body.standalone-mode .dashboard-table-header {
      display: grid;
      grid-template-columns: var(--table-cols);
      align-items: center;
      gap: 16px;
      padding: 14px var(--table-pad-x);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: var(--type-table-header);
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      opacity: 0.75;
      flex-shrink: 0;
      width: 100%;
      box-sizing: border-box;
    }
    body.standalone-mode .dashboard-table-header .sortable {
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    body.standalone-mode .dashboard-table-header .sortable:hover {
      color: var(--text-secondary);
    }
    body.standalone-mode .dashboard-table-header .sortable[data-dir]::after {
      content: attr(data-dir);
      font-size: var(--type-caption);
      opacity: 0.8;
    }
    body.standalone-mode .dashboard-table-header .dth-img,
    body.standalone-mode .dashboard-table-header .dth-status,
    body.standalone-mode .dashboard-table-header .dth-actions {
      justify-self: center;
    }
    body.standalone-mode .dashboard-table-header .dth-actions {
      text-align: center;
    }
    body.standalone-mode .dashboard-canvas #itemStatuses {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      padding: 0;
      gap: 0;
      width: 100%;
    }
    /* Standalone: sweep inside each product row when a scan completes (skip paused items) */
    body.standalone-mode #itemStatuses.scan-sweep .product-item:not(.product-item--paused) {
      position: relative;
      overflow: hidden;
    }
    body.standalone-mode #itemStatuses.scan-sweep .product-item:not(.product-item--paused)::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(90deg, transparent 0%, transparent 38%, rgba(255, 255, 255, 0.06) 48%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.06) 52%, transparent 62%, transparent 100%);
      animation: scan-sweep 0.85s ease-out forwards;
    }
    /* Popup: sweep inside each item box when a scan completes (skip paused items) */
    body:not(.standalone-mode) #itemStatuses.scan-sweep .product-item:not(.product-item--paused) {
      position: relative;
      overflow: hidden;
    }
    body:not(.standalone-mode) #itemStatuses.scan-sweep .product-item:not(.product-item--paused)::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(90deg, transparent 0%, transparent 38%, rgba(255, 255, 255, 0.06) 48%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.06) 52%, transparent 62%, transparent 100%);
      animation: scan-sweep 0.85s ease-out forwards;
    }
    @keyframes scan-sweep {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }
    body.standalone-mode .dashboard-canvas .product-item.dashboard-row {
      display: grid;
      grid-template-columns: var(--table-cols);
      align-items: center;
      flex-shrink: 0;
      gap: 16px;
      padding-block: 12px;
      padding-inline: var(--table-pad-x);
      min-height: var(--table-row-h);
      width: 100%;
      box-sizing: border-box;
      border-radius: 0;
      box-shadow: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);

    /* Classic – full starfield, twinkle + soft glow */
    .bg-layer--classic .star {

      50% { opacity: 0.85; transform: scale(1.08); }

    /* Velvet – same density, opacity only, softer glow, slower (refined) */
    .bg-layer--velvet .star {
      position: absolute;

      background: var(--accent);

    /* Pulse – stars steady, glow breathes */
    .bg-layer--pulse .star {
      position: absolute;
      width: 2px; height: 2px; border-radius: 50%;
      background: rgba(124, 58, 237, 0.5);
      box-shadow: 0 0 8px 2px rgba(124, 58, 237, 0.35);

    .settings-overlay .bg-buttons {
      margin-top: 0;
      gap: var(--space-2);
    }
    .settings-overlay .bg-btn {
      flex: 1;
      min-width: calc(50% - var(--space-1));
      padding: var(--space-3) var(--space-2);
    }
    .lang-buttons {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .lang-btn {
      flex: 1;
      min-width: calc(50% - var(--space-1));
      padding: var(--space-3) var(--space-2);
      font-size: var(--type-caption);
      font-weight: var(--font-weight-bold);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.2s var(--ease), border-color 0.2s var(--ease), color 0.2s var(--ease);
    }
    .lang-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .lang-btn.active { border-color: var(--accent); background: rgba(139, 92, 246, 0.15); color: var(--accent); }
    .settings-overlay-footer {
      flex-shrink: 0;
      padding: var(--space-4) var(--space-6);
      border-top: 1px solid var(--border);
      font-size: var(--type-caption);
      font-weight: var(--font-weight-medium);
      color: var(--text-tertiary);
      text-align: center;
    }
    .settings-overlay-footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }
    .settings-overlay-footer a:hover { color: var(--accent-hover); }
    .settings-overlay-footer a span { color: var(--accent-hover); }

    .highlight-flash { animation: entry-glow 1s ease-out; }
    @keyframes entry-glow {
      0% { background: var(--accent-muted); }
      100% { background: var(--surface); }
    }
    .shake { animation: shake-kb 0.3s ease-in-out both; border-color: var(--danger) !important; }
    @keyframes shake-kb {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(2px); }
    }

    /* Login gate: full-screen overlay when user is not logged in (last child so it paints on top) */
    .login-gate {
      position: absolute;
      inset: 0;
      z-index: 9999;
      display: flex !important;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(124, 58, 237, 0.08) 0%, transparent 50%);
      padding: var(--space-6);
      box-sizing: border-box;
      pointer-events: auto;
    }
    /* Only hide the gate when user is logged in */
    .main-wrapper.logged-in .login-gate { display: none !important; pointer-events: none; }
    .main-wrapper:not(.logged-in) #appContent { display: none !important; }
    .main-wrapper:not(.logged-in) .dashboard-wrapper { display: none !important; }
    .main-wrapper:not(.logged-in) #settingsOverlay { display: none !important; }
    #appContent {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      z-index: 1;
    }
    .login-gate-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .login-gate-iframe {
      flex: 1;
      width: 100%;
      min-height: 0;
      border: none;
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 0 0 1px var(--border), 0 8px 24px -8px rgba(0, 0, 0, 0.35);
    }
    .login-gate-logo {
      width: auto;
      height: 48px;
      margin-bottom: var(--space-6);
      object-fit: contain;
    }
    .login-gate-text {
      font-size: var(--type-panel-title);
      font-weight: var(--font-weight-bold);
      color: var(--text);
      margin: 0 0 var(--space-1);
      line-height: 1.35;
    }
    .login-gate-sub {
      font-size: var(--type-metadata);
      color: var(--text-tertiary);
      margin: 0 0 var(--space-4);
      line-height: 1.35;
    }
    .login-gate .field {
      text-align: left;
      margin-bottom: var(--space-4);
    }
    .login-gate .field input {
      width: 100%;
      box-sizing: border-box;
    }
    .login-gate-btn {
      width: 100%;
      padding: var(--space-4) var(--space-6);
      font-size: var(--type-product-name);
      font-weight: var(--font-weight-bold);
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s var(--ease), transform 0.1s var(--ease-out);
    }
    .login-gate-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.02);
    }
    .login-gate-options {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      width: 100%;
    }
    .login-gate-btn-option {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      font-size: var(--type-body);
      font-weight: var(--font-weight-semibold);
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s var(--ease), border-color 0.2s var(--ease), transform 0.1s var(--ease-out);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
    }
    .login-gate-btn-option:hover {
      background: var(--surface-elevated);
      border-color: var(--border-strong);
      transform: scale(1.01);
    }
    .login-gate-btn-option.login-gate-btn-email {
      margin-top: var(--space-2);
      background: var(--accent);
      border-color: transparent;
      color: #fff;
    }
    .login-gate-btn-option.login-gate-btn-email:hover {
      background: var(--accent-hover);
    }

    .product-item.loading { cursor: default; pointer-events: none; }
    .product-item.loading .remove-btn { pointer-events: auto; opacity: 0.6; }
    .skeleton-img {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface-elevated) 50%, var(--surface) 100%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.2s ease-in-out infinite;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface-elevated) 50%, var(--surface) 100%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.2s ease-in-out infinite;
    }
    .skeleton-line.short { width: 65%; margin-bottom: var(--space-2); }
    .skeleton-line.tiny { height: 10px; width: 40%; }
    @keyframes skeleton-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <div class="main-wrapper" id="mainWrapper" data-bg="peek">
    <div class="bg-layers" aria-hidden="true">
      <div class="bg-layer bg-layer--classic" id="bgClassic"></div>
      <div class="bg-layer bg-layer--velvet" id="bgVelvet"></div>
      <div class="bg-layer bg-layer--pulse" id="bgPulse"></div>
      <div class="bg-layer bg-layer--depth" id="bgDepth"></div>
      <div class="bg-layer bg-layer--peek" id="bgPeek"></div>
    </div>

    <div id="appContent">
    <header class="top-bar">
      <div class="header">
        <div class="header-left">
          <img src="RS%20full%20logo.png" alt="ReStock Pro" class="header-app-logo" draggable="false">
        </div>
        <div class="header-actions">
          <button type="button" class="window-trigger" id="window-button" aria-label="Open in separate window" title="Open in separate window" data-i18n-aria="openInWindow" data-i18n-title="openInWindow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
          </button>
        </div>
      </div>
      <div id="errorBanner" class="error-banner" aria-live="polite" role="alert">
        <span class="error-banner-message"></span>
        <button type="button" class="error-banner-close" aria-label="Dismiss error" title="Dismiss" data-i18n-aria="dismiss" data-i18n-title="dismiss">×</button>
      </div>
      <div id="monitorContainer" class="monitor-card" role="status" aria-live="polite" aria-label="Monitor status" draggable="false" data-i18n-aria="monitorStatus">
        <div id="status"><span class="dot dot-ready"></span> <span data-i18n="ready">Ready</span></div>
        <div id="countdown">—</div>
        <div class="countdown-progress-wrap">
          <div id="countdownProgressFill" class="countdown-progress-fill" style="width:0%"></div>
        </div>
      </div>
      <div class="add-bar">
        <div class="input-wrap" id="itemInputWrap" data-show-ghost="true">
          <input type="text" id="itemInput" placeholder="" autocomplete="off" spellcheck="false" aria-label="Add product" aria-describedby="inputHint" data-i18n-aria="addProduct">
          <span id="itemInputGhost" class="input-ghost" aria-hidden="true"><span class="input-ghost-prefix" data-i18n="addA">Add a</span><span class="input-ghost-slot-wrap"><span class="input-ghost-slot-strip" id="itemInputGhostStrip"><span class="input-ghost-suggestion input-ghost-line1" id="itemInputGhostLine1"></span><span class="input-ghost-suggestion input-ghost-line2" id="itemInputGhostLine2"></span></span></span></span>
        </div>
        <button type="button" id="addItemBtn" aria-label="Add item to list" title="Add to list" data-i18n-aria="addItemToList" data-i18n-title="addToListItem">+</button>
      </div>
      <div id="inputHint" class="input-hint" aria-live="polite" role="status"></div>
      <div id="upcDebug" class="upc-debug" aria-live="polite" role="status"></div>
      <div class="list-header-row" draggable="false">
        <span class="list-section-label" data-i18n="trackedItems">Tracked items</span>
        <button type="button" id="clearList" class="clear-list-btn" aria-label="Clear all tracked items" data-i18n="clearList" data-i18n-aria="clearListAria">Clear list</button>
      </div>
    </header>

    <main class="scroll-area" id="scrollArea">
      <div id="itemStatuses"></div>
    </main>

    <footer class="bottom-bar">
      <div class="bottom-bar-actions">
        <button type="button" id="toggleMonitoring" aria-label="Start or stop monitoring" title="Start monitoring when you have at least one item" data-i18n-aria="startOrStop" data-i18n-title="addAtLeastOne">Start monitoring</button>
        <button type="button" class="settings-trigger icon-btn" id="settingsTrigger" aria-label="Open settings" title="Settings" data-i18n-aria="openSettings" data-i18n-title="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
      <p id="disabledHint" class="disabled-hint" aria-live="polite" style="display:none;" data-i18n="disabledHint">Add at least one item above to start monitoring</p>
    </footer>

    <div class="settings-overlay" id="settingsOverlay" aria-hidden="true">
      <div class="settings-overlay-header">
        <span class="settings-overlay-title" data-i18n="settings">Settings</span>
        <button type="button" class="settings-overlay-close" id="settingsClose" aria-label="Close settings" data-i18n="done" data-i18n-aria="closeSettings">Done</button>
      </div>
      <div class="settings-overlay-body">
        <div class="settings-overlay-section">
          <div class="settings-overlay-section-title" data-i18n="account">Account</div>
          <p class="settings-overlay-section-desc" data-i18n="accountDesc">Log in to sync your plan and unlock Pro.</p>
          <div class="settings-overlay-card" id="accountCard">
            <p id="accountStatus" class="account-status" style="margin: 0 0 0.5rem; font-size: var(--type-body); color: var(--text-tertiary);">—</p>
            <div class="account-actions">
              <button type="button" id="loginBtn" class="lang-btn" style="min-width: 100%;" data-i18n="login">Log in</button>
              <button type="button" id="logoutBtn" class="lang-btn" style="min-width: 100%; display: none;" data-i18n="logOut">Log out</button>
            </div>
          </div>
        </div>
        <div class="settings-overlay-section">
          <div class="settings-overlay-section-title" data-i18n="language">Language</div>
          <p class="settings-overlay-section-desc" data-i18n="languageDesc"></p>
          <div class="settings-overlay-card">
            <div class="lang-buttons">
              <button type="button" class="lang-btn active" data-lang="en" aria-pressed="true">English</button>
              <button type="button" class="lang-btn" data-lang="es" aria-pressed="false">Español</button>
            </div>
          </div>
        </div>
        <div class="settings-overlay-section">
          <div class="settings-overlay-section-title" data-i18n="locationCheckInterval">Location & check interval</div>
          <p class="settings-overlay-section-desc" data-i18n="locationCheckDesc"></p>
          <div class="settings-overlay-card">
            <div class="settings-grid">
              <div class="field">
                <label for="zipCode" data-i18n="zipCode">ZIP code</label>
                <input type="text" id="zipCode" value="90028" inputmode="numeric" maxlength="5" placeholder="12345">
              </div>
              <div class="field">
                <label for="interval" data-i18n="checkEvery">Check every (seconds)</label>
                <input type="number" id="interval" value="3" min="1" max="300" data-i18n-aria="checkIntervalAria">
              </div>
            </div>
          </div>
        </div>
        <div class="settings-overlay-section">
          <div class="settings-overlay-section-title" data-i18n="backgroundTheme">Background theme</div>
          <p class="settings-overlay-section-desc" data-i18n="backgroundThemeDesc"></p>
          <div class="settings-overlay-card">
            <div class="bg-buttons">
              <button type="button" class="bg-btn" data-bg="classic" data-i18n="classic">Classic</button>
              <button type="button" class="bg-btn" data-bg="velvet" data-i18n="velvet">Velvet</button>
              <button type="button" class="bg-btn" data-bg="pulse" data-i18n="pulse">Pulse</button>
              <button type="button" class="bg-btn" data-bg="depth" data-i18n="depth">Depth</button>
              <button type="button" class="bg-btn active" data-bg="peek" data-i18n="peek">Peek</button>
            </div>
          </div>
        </div>
      </div>
      <div class="settings-overlay-footer">
        <a href="https://www.venmo.com/u/MarcyAvila" target="_blank" rel="noopener"><span data-i18n="developedBy"></span><span data-i18n="venmo"></span></a>
      </div>
    </div>
    </div>

    <div class="login-gate" id="loginGate">
      <div class="login-gate-inner">
        <iframe id="loginGateFrame" class="login-gate-iframe" title="Sign in to ReStock Pro" src="https://getrestock.app/auth?from_extension=1"></iframe>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
